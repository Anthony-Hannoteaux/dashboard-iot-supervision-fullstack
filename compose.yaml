services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: dashboard-iot-api-dev
    restart: unless-stopped
    ports:
      - "${BACKEND_HOST_PORT}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      # On utilise le réseau interne de Docker Compose
      # Nos conteneurs communiquent directement via leur nom de service
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backend:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: dashboard-iot-postgres-dev
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    # Variables utilisées par l'image PostgreSQL
    # https://hub.docker.com/_/postgres#environment-variables
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql
    # Healthcheck : Permet de vérifier que postgres à bien démarrer
    # https://docs.docker.com/reference/compose-file/services/#healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  api_node_modules: